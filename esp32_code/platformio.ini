[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload options
upload_port = /dev/cu.usbserial-*
upload_speed = 921600

; Build options
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    mikalhart/TinyGPSPlus@^1.0.3
    espressif/esp32@^2.0.11

; Board configuration
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs

; WiFi and Network settings
build_flags = 
    ${env:esp32dev.build_flags}
    -DWIFI_SSID=\"Ergun2d4\"
    -DWIFI_PASSWORD=\"Faithful@243\"
    -DSERVER_URL=\"https://safezone-cow-tracker.herokuapp.com\"

; Hardware configuration
board_build.flash_mode = dio
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L

; Debug configuration
debug_tool = esp-prog
debug_init_break = tbreak setup

; OTA (Over-The-Air) update configuration
upload_protocol = esptool
; Uncomment below for OTA updates
; upload_protocol = espota
; upload_port = safezone-cow-001.local

; Custom upload command for multiple devices
; upload_command = python upload_multiple.py

; Environment variables
extra_scripts = 
    pre:scripts/pre_build.py
    post:scripts/post_build.py

; Development environment
[env:esp32dev_debug]
extends = env:esp32dev
build_type = debug
build_flags = 
    ${env:esp32dev.build_flags}
    -DDEBUG_MODE=1
    -DLOG_LEVEL=5

; Production environment
[env:esp32dev_release]
extends = env:esp32dev
build_type = release
build_flags = 
    ${env:esp32dev.build_flags}
    -DPRODUCTION_MODE=1
    -DLOG_LEVEL=2
    -Os

; Testing environment
[env:esp32dev_test]
extends = env:esp32dev
build_flags = 
    ${env:esp32dev.build_flags}
    -DTEST_MODE=1
    -DMOCK_GPS=1
lib_deps = 
    ${env:esp32dev.lib_deps}
    unity

; Hardware pin definitions
[common]
build_flags = 
    -DLED1_PIN=2
    -DLED2_PIN=4
    -DLED3_PIN=5
    -DBUZZER_PIN=18
    -DGPS_RX_PIN=16
    -DGPS_TX_PIN=17
    -DEMERGENCY_STOP_PIN=0

; Multi-device configuration
[env:cow001]
extends = env:esp32dev
build_flags = 
    ${env:esp32dev.build_flags}
    -DCOW_ID=\"C001\"
    -DDEVICE_NAME=\"SafeZone-Cow-001\"

[env:cow002]
extends = env:esp32dev
build_flags = 
    ${env:esp32dev.build_flags}
    -DCOW_ID=\"C002\"
    -DDEVICE_NAME=\"SafeZone-Cow-002\"

[env:cow003]
extends = env:esp32dev
build_flags = 
    ${env:esp32dev.build_flags}
    -DCOW_ID=\"C003\"
    -DDEVICE_NAME=\"SafeZone-Cow-003\"